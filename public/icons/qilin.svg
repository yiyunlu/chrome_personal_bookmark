<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="qilin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="horn" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" stroke="#334155" stroke-width="2"/>

  <!-- Binary digits scattered (subtle) -->
  <g fill="#334155" font-family="monospace" font-size="7" opacity="0.5">
    <text x="12" y="28">01</text>
    <text x="98" y="22">10</text>
    <text x="18" y="108">11</text>
    <text x="94" y="112">00</text>
    <text x="8" y="64">1</text>
    <text x="112" y="70">0</text>
    <text x="50" y="16">01</text>
    <text x="56" y="120">10</text>
  </g>

  <!-- Qilin body — stylized pixel/geometric -->
  <g filter="url(#glow)">
    <!-- Main body -->
    <path d="M42 82 L48 68 L56 62 L68 60 L78 64 L84 72 L86 82 L82 90 L72 94 L58 94 L48 90 Z"
          fill="url(#qilin)" opacity="0.9"/>

    <!-- Neck -->
    <path d="M56 62 L52 48 L58 38 L66 36 L70 42 L68 56 L68 60"
          fill="url(#qilin)" opacity="0.9"/>

    <!-- Head -->
    <path d="M52 48 L44 42 L42 34 L48 28 L58 26 L64 30 L66 36 L58 38 Z"
          fill="url(#qilin)" opacity="0.95"/>

    <!-- Horn (single horn - defining qilin feature) -->
    <path d="M54 26 L52 14 L56 10 L58 14 L56 26"
          fill="url(#horn)" opacity="0.95"/>

    <!-- Legs (pixel-style blocks) -->
    <rect x="50" y="90" width="6" height="14" rx="1" fill="url(#qilin)" opacity="0.85"/>
    <rect x="60" y="90" width="6" height="16" rx="1" fill="url(#qilin)" opacity="0.85"/>
    <rect x="70" y="90" width="6" height="14" rx="1" fill="url(#qilin)" opacity="0.85"/>
    <rect x="78" y="88" width="6" height="12" rx="1" fill="url(#qilin)" opacity="0.85"/>

    <!-- Tail (flowing, digital) -->
    <path d="M86 82 L94 76 L100 78 L96 84 L90 86"
          fill="none" stroke="url(#qilin)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <path d="M100 78 L106 72 L108 76"
          fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

    <!-- Mane (digital wisps) -->
    <path d="M56 38 L50 32 L46 34" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <path d="M60 34 L56 28 L52 28" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M64 32 L62 24 L58 22" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Eye -->
    <circle cx="50" cy="34" r="2.5" fill="#0d1117"/>
    <circle cx="51" cy="33.5" r="1" fill="#60a5fa"/>

    <!-- Scale pattern (binary-inspired dots) -->
    <circle cx="58" cy="72" r="1.5" fill="#0d1117" opacity="0.3"/>
    <circle cx="64" cy="68" r="1.5" fill="#0d1117" opacity="0.3"/>
    <circle cx="70" cy="72" r="1.5" fill="#0d1117" opacity="0.3"/>
    <circle cx="76" cy="76" r="1.5" fill="#0d1117" opacity="0.3"/>
    <circle cx="62" cy="78" r="1.5" fill="#0d1117" opacity="0.3"/>
    <circle cx="68" cy="80" r="1.5" fill="#0d1117" opacity="0.3"/>
    <circle cx="74" cy="84" r="1.5" fill="#0d1117" opacity="0.3"/>
    <circle cx="56" cy="80" r="1.5" fill="#0d1117" opacity="0.3"/>

    <!-- Digital flame wisps from hooves -->
    <path d="M53 104 L52 108 L54 106" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <path d="M63 106 L62 110 L64 108" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Subtle binary overlay on body -->
  <g fill="#c4b5fd" font-family="monospace" font-size="5" opacity="0.15">
    <text x="54" y="76">010</text>
    <text x="66" y="84">101</text>
    <text x="58" y="88">110</text>
  </g>
</svg>
